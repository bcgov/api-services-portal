services:
- name: service-for-permission
  host: httpbin.org
  tags: [ns.permission]
  port: 443
  protocol: https
  retries: 0
  routes:
  - name: service-for-permission-route
    tags: [ns.permission]
    hosts:
      - service-for-permission.api.gov.bc.ca
    paths:
      - /
    methods:
      - GET
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
  plugins:
  - name: key-auth
    tags: [ ns.permission ]
    protocols: [ http, https ]
    config:
      key_names: ["X-API-KEY"]
      run_on_preflight: true
      hide_credentials: true
      key_in_body: false
  - name: acl
    tags: [ ns.permission ]
    config:
      hide_groups_header: true
      allow: [ "D2871466" ]
