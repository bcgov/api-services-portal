services:
- name: cc-service-for-platform
  host: httpbin.org
  tags: [ns.gw-974bf]
  port: 443
  protocol: https
  retries: 0
  routes:
  - name: cc-service-for-platform-route
    tags: [ns.gw-974bf]
    hosts:
      - cc-service-for-platform.api.gov.bc.ca
    paths:
      - /
    methods:
      - GET
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
  plugins:
  - name: jwt-keycloak
    tags: [ ns.gw-974bf ]
    enabled: true
    config:
      allowed_iss:
      - https://authz-apps-gov-bc-ca-lab.dev.api.gov.bc.ca/auth/realms/aps
      
      run_on_preflight: true
      iss_key_grace_period: 10
      maximum_expiration: 0
      algorithm: RS256
      claims_to_verify:
      - exp
      uri_param_names:
      - jwt
      cookie_names: []
      scope: null
      roles: null
      realm_roles: null
      client_roles: null
      anonymous: null
      consumer_match: true
      consumer_match_claim: azp  
      consumer_match_claim_custom_id: true
      consumer_match_ignore_not_found: false